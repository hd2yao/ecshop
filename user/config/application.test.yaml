app:
  env: test
  name: ecshop
  log:
    path: "./storage/logs/ecshop.log"
    max_size: 100
    max_age: 60
database:
  master:
    type: mysql
    dsn: root:superpass@tcp(localhost:30306)/ecshop?charset=utf8&parseTime=True&loc=Asia%2FShanghai
    maxopen: 100
    maxidle: 10
    maxlifetime: 300000000000 # 300s 内可复用
  slave:
    type: mysql
    dsn: root:superpass@tcp(localhost:30306)/ecshop?charset=utf8&parseTime=True&loc=Asia%2FShanghai
    maxopen: 100
    maxidle: 10
    maxlifetime: 300000000000