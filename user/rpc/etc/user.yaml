Name: user.rpc
ListenOn: 0.0.0.0:9000
Etcd:
  Hosts:
  - etcd:2379
  Key: user.rpc

# 数据库配置
DataSource: "root:123456@tcp(mysql:3306)/ecshop?charset=utf8mb4&parseTime=true&loc=Local"

# 统一的Redis配置（用于数据缓存和业务数据存储）
CacheRedis:
  - Host: redis:6379
    Type: node
    Pass:

# 验证码配置
Captcha:
  StoreType: redis
  Expiration: 600
  Prefix: "captcha:"

# 邮件配置
Mail:
  smtp:
    host: "smtp.qq.com"               # QQ邮箱SMTP服务器
    port: 587                         # TLS端口
    username: ${MAIL_USERNAME}        # 环境变量：您的QQ邮箱
    password: ${MAIL_PASSWORD}        # 环境变量：QQ邮箱授权码（不是QQ密码）
    from: ${MAIL_FROM}                # 环境变量：发件人邮箱，同Username
    from_name: "EcShop验证服务"       # 发件人显示名称
  template:
    verify_code_subject: "【EcShop】邮箱验证码"
    verify_code_body: |
      亲爱的用户，您好！
      
      您的邮箱验证码是：{{.Code}}
      
      验证码有效期为 {{.ExpireMinutes}} 分钟，请尽快完成验证。
      
      如果这不是您的操作，请忽略此邮件。
      
      感谢您使用 EcShop！

# OSS配置
Oss:
  access_key_id: ${OSS_ACCESS_KEY_ID}               # 环境变量
  access_key_secret: ${OSS_ACCESS_KEY_SECRET}       # 环境变量
  endpoint: "oss-cn-shanghai.aliyuncs.com"
  default_bucket: "hd2yao"
  cdn_domain: ""
  enable_cdn: false
  enable_https: true
  max_file_size: 5242880
  allowed_types:
    - jpg
    - jpeg
    - png
    - gif
  upload_path: "avatars"                            # 上传路径前缀
