syntax = "proto3";

package user;
option go_package = "./user";

// 验证码服务
service User {
  // 图形验证码
  rpc GenerateCaptcha(GenerateCaptchaReq) returns (GenerateCaptchaResp);
  rpc VerifyCaptcha(VerifyCaptchaReq) returns (VerifyCaptchaResp);
  
  // 邮件验证码
  rpc SendMailCode(SendMailCodeReq) returns (SendMailCodeResp);
  rpc VerifyMailCode(VerifyMailCodeReq) returns (VerifyMailCodeResp);
  rpc SendRegisterMailCode(SendRegisterMailCodeReq) returns (SendMailCodeResp);
  
  // 用户注册
  rpc Register(RegisterReq) returns (RegisterResp);
  
  // 文件上传
  rpc UploadAvatar(UploadAvatarReq) returns (UploadAvatarResp);
}

// 图形验证码相关
message GenerateCaptchaReq {
  string captcha_type = 1;
  CaptchaConfig config = 2;
  DrawOptions draw_opts = 3;
}

message GenerateCaptchaResp {
  int32 code = 1;
  string message = 2;
  string captcha_id = 3;
  string image_data = 4;
  string answer = 5; // 测试环境使用
}

message VerifyCaptchaReq {
  string captcha_id = 1;
  string answer = 2;
}

message VerifyCaptchaResp {
  int32 code = 1;
  string message = 2;
  bool valid = 3;
}

// 邮件验证码相关
message SendMailCodeReq {
  string email = 1;
  int32 code_length = 2;
}

message SendMailCodeResp {
  int32 code = 1;
  string message = 2;
  string email = 3;
  string code_id = 4; // 测试环境返回
}

message VerifyMailCodeReq {
  string email = 1;
  string code = 2;
}

message VerifyMailCodeResp {
  int32 code = 1;
  string message = 2;
  bool valid = 3;
}

// 注册时发送邮件验证码
message SendRegisterMailCodeReq {
  string captcha_id = 1;
  string captcha_code = 2;
  string email = 3;
  int32 code_length = 4;
}

// 用户注册相关
message RegisterReq {
  string email = 1;
  string email_code = 2;
  string password = 3;
  string name = 4;
  string phone = 5;
  int32 sex = 6;
}

message RegisterResp {
  int32 code = 1;
  string message = 2;
  int64 user_id = 3;
  string token = 4;
  UserInfo user_info = 5;
}

message UserInfo {
  int64 id = 1;
  string name = 2;
  string avatar = 3;
  string email = 4;
  string phone = 5;
  int32 sex = 6;
  int32 points = 7;
  string create_time = 8;
}

// 辅助结构
message CaptchaConfig {
  int32 width = 1;
  int32 height = 2;
  int32 length = 3;
  string bg_color = 4;
}

message DrawOptions {
  bool use_custom_draw = 1;
  bool draw_text = 2;
  bool draw_hollow = 3;
  bool draw_sine = 4;
  int32 draw_slim_line = 5;
  string draw_noise_text = 6;
}

// 头像上传相关
message UploadAvatarReq {
  int64 user_id = 1;      // 用户ID
  bytes file_data = 2;    // 文件数据
  string filename = 3;    // 文件名
  int64 file_size = 4;    // 文件大小
}

message UploadAvatarResp {
  int32 code = 1;
  string message = 2;
  string url = 3;         // 文件访问URL
  string cdn_url = 4;     // CDN访问URL
  string key = 5;         // 文件存储路径
  int64 size = 6;         // 文件大小
}