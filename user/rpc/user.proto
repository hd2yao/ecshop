syntax = "proto3";

package user;
option go_package = "./user";

// 验证码服务
service User {
  // 图形验证码
  rpc GenerateCaptcha(GenerateCaptchaReq) returns (GenerateCaptchaResp);
  rpc VerifyCaptcha(VerifyCaptchaReq) returns (VerifyCaptchaResp);
  
  // 邮件验证码
  rpc SendRegisterMailCode(SendRegisterMailCodeReq) returns (SendMailCodeResp);
  
  // 用户注册
  rpc Register(RegisterReq) returns (RegisterResp);

  // 头像上传
  rpc UploadPreviewAvatar(UploadPreviewAvatarReq) returns (UploadPreviewAvatarResp);
  
  // 用户登录
  rpc Login(LoginReq) returns (LoginResp);
  
  // 刷新Token
  rpc RefreshToken(RefreshTokenReq) returns (RefreshTokenResp);
  
  // 获取用户信息
  rpc GetUserInfo(GetUserInfoReq) returns (GetUserInfoResp);
  
  // 修改用户信息
  rpc UpdateUserInfo(UpdateUserInfoReq) returns (UpdateUserInfoResp);
  
  // 用户地址管理
  rpc GetAddressList(GetAddressListReq) returns (GetAddressListResp);
  rpc GetAddressDetail(GetAddressDetailReq) returns (GetAddressDetailResp);
  rpc AddAddress(AddAddressReq) returns (AddAddressResp);
  rpc UpdateAddress(UpdateAddressReq) returns (UpdateAddressResp);
  rpc DeleteAddress(DeleteAddressReq) returns (DeleteAddressResp);
}

// 图形验证码相关
message GenerateCaptchaReq {
  string captcha_type = 1;
  CaptchaConfig config = 2;
  DrawOptions draw_opts = 3;
}

// 辅助结构
message CaptchaConfig {
  int32 width = 1;
  int32 height = 2;
  int32 length = 3;
  string bg_color = 4;
}

message DrawOptions {
  bool use_custom_draw = 1;
  bool draw_text = 2;
  bool draw_hollow = 3;
  bool draw_sine = 4;
  int32 draw_slim_line = 5;
  string draw_noise_text = 6;
}

message GenerateCaptchaResp {
  int32 code = 1;
  string message = 2;
  string captcha_id = 3;
  string image_data = 4;
  string answer = 5; // 测试环境使用
}

message VerifyCaptchaReq {
  string captcha_id = 1;
  string answer = 2;
}

message VerifyCaptchaResp {
  int32 code = 1;
  string message = 2;
  bool valid = 3;
}

// 邮件验证码相关
message SendMailCodeResp {
  int32 code = 1;
  string message = 2;
  string email = 3;
  string code_id = 4; // 测试环境返回
}

// 注册时发送邮件验证码
message SendRegisterMailCodeReq {
  string captcha_id = 1;
  string captcha_code = 2;
  string email = 3;
  int32 code_length = 4;
}

// 用户注册相关
message RegisterReq {
  string email = 1;
  string email_code = 2;
  string password = 3;
  string name = 4;
  string phone = 5;
  int32 sex = 6;
  string avatar = 7;  // 头像OSS地址
}

message RegisterResp {
  int32 code = 1;
  string message = 2;
  int64 user_id = 3;
  UserInfo user_info = 4;
}

// 头像管理相关
message UploadPreviewAvatarReq {
  bytes file_data = 1;    // 文件数据
  string filename = 2;    // 文件名
  int64 file_size = 3;    // 文件大小
}

message UploadPreviewAvatarResp {
  int32 code = 1;
  string message = 2;
  string preview_key = 3; // 预览标识
  string preview_url = 4; // 预览图片URL
}

// 用户登录相关
message LoginReq {
  string email = 1;     // 邮箱（邮箱和手机号二选一）
  string phone = 2;     // 手机号（邮箱和手机号二选一）
  string password = 3;  // 密码
}

message LoginResp {
  int32 code = 1;
  string message = 2;
  int64 user_id = 3;
  string access_token = 4;   // Access Token (2小时)
  string refresh_token = 5;  // Refresh Token (7天)
  string access_token_expire_time = 6;  // Access Token 过期时间（ISO 8601格式）
  UserInfo user_info = 7;
}

message UserInfo {
  int64 id = 1;
  string name = 2;
  string avatar = 3;
  string email = 4;
  string phone = 5;
  int32 sex = 6;
  int32 points = 7;
  string create_time = 8;
  int64 follow_count = 9;    // 关注数
  int64 follower_count = 10; // 粉丝数
}

// Token 刷新相关
message RefreshTokenReq {
  string refresh_token = 1;  // Refresh Token
}

message RefreshTokenResp {
  int32 code = 1;
  string message = 2;
  string access_token = 3;   // 新的 Access Token
  string refresh_token = 4;  // 新的 Refresh Token（可选：滚动刷新）
  string access_token_expire_time = 5;  // Access Token 过期时间（ISO 8601格式）
}

// 获取用户信息相关
message GetUserInfoReq {
  int64 user_id = 1;  // 用户ID（从token中获取）
}

message GetUserInfoResp {
  int32 code = 1;
  string message = 2;
  UserInfo user_info = 3;  // 用户信息
}

// 修改用户信息相关
message UpdateUserInfoReq {
  int64 user_id = 1;  // 用户ID
  string name = 2;    // 用户昵称（可选）
  string avatar = 3;  // 头像OSS地址（可选）
  string phone = 4;   // 手机号（可选）
  int32 sex = 5;      // 性别：0女 1男（可选）
}

message UpdateUserInfoResp {
  int32 code = 1;
  string message = 2;
  UserInfo user_info = 3;  // 更新后的用户信息
}

// 用户地址管理相关
message AddressInfo {
  int64 id = 1;
  int64 user_id = 2;
  int32 default_status = 3;  // 是否默认：0否 1是
  string receive_name = 4;   // 收货人姓名
  string phone = 5;          // 收货人电话
  string province = 6;       // 省/直辖市
  string city = 7;           // 市
  string region = 8;         // 区
  string detail_address = 9; // 详细地址
  string create_time = 10;   // 创建时间
  string update_time = 11;   // 更新时间
}

// 获取用户全部地址列表
message GetAddressListReq {
  int64 user_id = 1;  // 用户ID
}

message GetAddressListResp {
  int32 code = 1;
  string message = 2;
  repeated AddressInfo address_list = 3;
}

// 获取地址详情
message GetAddressDetailReq {
  int64 user_id = 1;     // 用户ID
  int64 address_id = 2;  // 地址ID
}

message GetAddressDetailResp {
  int32 code = 1;
  string message = 2;
  AddressInfo address = 3;
}

// 新增地址
message AddAddressReq {
  int64 user_id = 1;
  int32 default_status = 2;
  string receive_name = 3;
  string phone = 4;
  string province = 5;
  string city = 6;
  string region = 7;
  string detail_address = 8;
}

message AddAddressResp {
  int32 code = 1;
  string message = 2;
  int64 address_id = 3;  // 新增的地址ID
}

// 修改地址
message UpdateAddressReq {
  int64 user_id = 1;
  int64 address_id = 2;
  int32 default_status = 3;
  string receive_name = 4;
  string phone = 5;
  string province = 6;
  string city = 7;
  string region = 8;
  string detail_address = 9;
}

message UpdateAddressResp {
  int32 code = 1;
  string message = 2;
}

// 删除地址
message DeleteAddressReq {
  int64 user_id = 1;
  int64 address_id = 2;
}

message DeleteAddressResp {
  int32 code = 1;
  string message = 2;
}